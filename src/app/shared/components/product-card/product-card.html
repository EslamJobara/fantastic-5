<div class="group cursor-pointer" (click)="onViewDetails()">
  <div class="bg-white/60 border border-white/40 rounded-2xl sm:rounded-3xl aspect-[4/5] overflow-hidden mb-4 sm:mb-6 relative">
    <img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" 
         [alt]="product?.name" 
         [src]="product?.defaultImg"
         (error)="$event.target.src='https://via.placeholder.com/400x500?text=No+Image'"/>
  </div>
  
  <div class="flex items-center justify-between flex-wrap gap-2 mb-2">
    <h3 class="text-base sm:text-lg font-black tracking-tight group-hover:text-primary transition-colors flex-1 line-clamp-1">{{ product?.name }}</h3>
    <p class="text-primary font-black whitespace-nowrap text-sm sm:text-base">{{ product?.price | currency:'EGP':'symbol':'1.0-0' }}</p>
  </div>
  
  <p class="text-[10px] sm:text-xs text-slate-500 line-clamp-2 mb-3 sm:mb-4">{{ product?.description }}</p>
  
  @if (showActions) {
    <div class="flex gap-2 sm:gap-3">
      @if (showAddToCart) {
        <button (click)="onAddToCart(); $event.stopPropagation()"
          [disabled]="isAddingToCart || isAddedToCart"
          class="flex-1 bg-white/80 backdrop-blur border border-slate-200 glass-card rounded-lg sm:rounded-xl hover:border-primary hover:text-primary hover:bg-white hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2 py-2.5 sm:py-3 active:scale-95 disabled:opacity-70 disabled:cursor-not-allowed">
          @if (isAddingToCart) {
            <div class="w-3.5 h-3.5 sm:w-4 sm:h-4 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
          } @else if (isAddedToCart) {
            <span class="material-symbols-outlined text-sm sm:text-base text-green-600">check_circle</span>
          } @else {
            <span class="material-symbols-outlined text-sm sm:text-base">add_shopping_cart</span>
          }
          <span class="text-xs sm:text-sm font-semibold">
            @if (isAddingToCart) {
              Adding...
            } @else if (isAddedToCart) {
              Added!
            } @else {
              {{ addToCartLabel }}
            }
          </span>
        </button>
      }
      @if (showViewDetails) {
        <button (click)="onViewDetails(); $event.stopPropagation()"
          class="w-10 h-10 sm:w-12 sm:h-12 bg-white/80 backdrop-blur border border-slate-200 text-slate-700 glass-card rounded-lg sm:rounded-xl hover:border-primary hover:text-primary hover:bg-white hover:-translate-y-0.5 transition-all flex items-center justify-center active:scale-95">
          <span class="material-symbols-outlined text-lg sm:text-xl">arrow_forward</span>
        </button>
      }
    </div>
  }
</div>
