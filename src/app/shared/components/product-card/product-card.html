<div class="group cursor-pointer">
<div class="group cursor-pointer" (click)="onViewDetails()">
  <div class="bg-white/60 border border-white/40 rounded-3xl aspect-[4/5] overflow-hidden mb-6 relative">
    <img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" 
         [alt]="product?.name" 
         [src]="product?.image"
         appImgFallback/>
    <button class="absolute top-4 right-4 w-10 h-10 bg-white/80 backdrop-blur rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all translate-y-2 group-hover:translate-y-0">
      <span class="material-symbols-outlined text-slate-900 text-xl">favorite</span>
    </button>
  </div>
  
  <!-- Name and Price -->
  <div class="flex items-center justify-between flex-wrap gap-2 mb-2">
    <h3 class="text-lg font-black tracking-tight group-hover:text-primary transition-colors flex-1 line-clamp-1">{{ product?.name }}</h3>
    <p class="text-primary font-black whitespace-nowrap">EGP {{ product?.price }}</p>
  </div>
  
  <!-- Product Description -->
  <p class="text-xs text-slate-500 line-clamp-2 mb-4">{{ product?.description }}</p>
  
  <!-- CTA Buttons -->
  <div class="flex gap-3" *ngIf="showActions">
    <button 
      *ngIf="showAddToCart"
      (click)="onAddToCart(); $event.stopPropagation()"
      [disabled]="isAdding"
      class="flex-1 bg-white/80 backdrop-blur border border-slate-200 glass-card rounded-xl hover:border-primary hover:text-primary hover:bg-white hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2 py-3 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
      <span *ngIf="!isAdding" class="material-symbols-outlined text-base">add_shopping_cart</span>
      <div *ngIf="isAdding" class="w-4 h-4 border-2 border-primary/20 border-t-primary rounded-full animate-spin"></div>
      <span class="text-sm font-semibold">{{ isAdding ? 'Adding...' : addToCartLabel }}</span>
    </button>
    <button 
      *ngIf="showViewDetails"
      (click)="onViewDetails(); $event.stopPropagation()"
      class="w-12 h-12 bg-white/80 backdrop-blur border border-slate-200 text-slate-700 glass-card rounded-xl hover:border-primary hover:text-primary hover:bg-white hover:-translate-y-0.5 transition-all flex items-center justify-center active:scale-95">
      <span class="material-symbols-outlined text-xl">arrow_forward</span>
    </button>
  </div>
</div>
