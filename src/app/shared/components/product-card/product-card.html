<div class="group cursor-pointer">
<div class="group cursor-pointer" (click)="onViewDetails()">
  <div class="bg-white/60 border border-white/40 rounded-3xl aspect-[4/5] overflow-hidden mb-6 relative">
    <img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" 
         [alt]="product?.name" 
         [src]="product?.defaultImg"
         (error)="$event.target.src='https://via.placeholder.com/400x500?text=No+Image'"/>
  </div>
  
  <div class="flex items-center justify-between flex-wrap gap-2 mb-2">
    <h3 class="text-lg font-black tracking-tight group-hover:text-primary transition-colors flex-1 line-clamp-1">{{ product?.name }}</h3>
    <p class="text-primary font-black whitespace-nowrap">EGP {{ product?.price }}</p>
  </div>
  
  <p class="text-xs text-slate-500 line-clamp-2 mb-4">{{ product?.description }}</p>
  
  @if (showActions) {
    <div class="flex gap-3">
      @if (showAddToCart) {
        <button
          (click)="onAddToCart(); $event.stopPropagation()"
          [disabled]="isAddingToCart"
          class="flex-1 bg-white/80 backdrop-blur border border-slate-200 glass-card rounded-xl hover:border-primary hover:text-primary hover:bg-white hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2 py-3 active:scale-95 disabled:opacity-60 disabled:cursor-not-allowed">
          <span class="material-symbols-outlined text-base">add_shopping_cart</span>
          <span class="text-sm font-semibold">{{ isAddingToCart ? 'Adding...' : addToCartLabel }}</span>
        </button>
      }
      @if (showViewDetails) {
        <button (click)="onViewDetails(); $event.stopPropagation()"
          class="w-12 h-12 bg-white/80 backdrop-blur border border-slate-200 text-slate-700 glass-card rounded-xl hover:border-primary hover:text-primary hover:bg-white hover:-translate-y-0.5 transition-all flex items-center justify-center active:scale-95">
          <span class="material-symbols-outlined text-xl">arrow_forward</span>
        </button>
      }
    </div>
    @if (addToCartSuccess) {
      <p class="text-sm text-green-600 font-medium mt-3">Added to cart successfully.</p>
    }
    @if (addToCartError) {
      <p class="text-sm text-error font-medium mt-3">{{ addToCartError }}</p>
    }
  }
</div>
