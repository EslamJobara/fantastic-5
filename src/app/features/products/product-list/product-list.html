<app-blob-background />
<main class="pt-32 pb-20 max-w-7xl mx-auto px-8">
  <!-- Sorting & Stats - Full Width -->
  <div class="flex flex-col md:flex-row items-start md:items-end justify-between gap-6 mb-12">
    <div>
      <p class="text-body-md text-on-surface-variant">Displaying {{ products.length }} Precision Instruments</p>
    </div>
    
    <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-4 w-full md:w-auto">
      <!-- Search Bar -->
      <div class="w-full sm:w-80">
        <app-search-bar 
          placeholder="Search products..." 
          width="w-full"
          variant="page"
          (search)="handleSearch($event)">
        </app-search-bar>
      </div>
      
      <!-- Sort Dropdown -->
      <div class="flex items-center gap-4 whitespace-nowrap">
        <label class="label-md text-outline">Sort By</label>
        <select class="bg-transparent no-line text-sm font-bold text-primary focus:ring-0 cursor-pointer">
          <option>Newest Arrivals</option>
          <option>Price: Low to High</option>
          <option>Price: High to Low</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Filters & Products Side by Side -->
  <div class="flex flex-col md:flex-row gap-12">
    <!-- Sidebar Filters -->
    <aside class="w-full md:w-64 flex-shrink-0">
      <div class="glass-card rounded-3xl p-8 space-y-10 sticky top-24">
        <section>
          <h3 class="label-md text-outline mb-6">Category</h3>
          <div class="space-y-3">
            <!-- All Categories -->
            <label class="flex items-center gap-3 group cursor-pointer tonal-shift p-2 rounded-lg">
              <div class="w-5 h-5 rounded ghost-border group-hover:border-primary transition-colors flex items-center justify-center">
                <div class="w-2.5 h-2.5 bg-primary rounded-sm" [class.opacity-100]="!selectedCategory" [class.opacity-0]="selectedCategory"></div>
              </div>
              <input type="radio" name="category" class="hidden" [checked]="!selectedCategory" (change)="filterByCategory(null)"/>
              <span class="text-on-surface-variant group-hover:text-on-surface transition-colors">All Products</span>
            </label>
            
            <!-- Dynamic Categories -->
            <label *ngFor="let category of categories" class="flex items-center gap-3 group cursor-pointer tonal-shift p-2 rounded-lg">
              <div class="w-5 h-5 rounded ghost-border group-hover:border-primary transition-colors flex items-center justify-center">
                <div class="w-2.5 h-2.5 bg-primary rounded-sm" [class.opacity-100]="selectedCategory === category._id" [class.opacity-0]="selectedCategory !== category._id"></div>
              </div>
              <input type="radio" name="category" class="hidden" [checked]="selectedCategory === category._id" (change)="filterByCategory(category._id)"/>
              <span class="text-on-surface-variant group-hover:text-on-surface transition-colors">{{ category.name }}</span>
            </label>
          </div>
        </section>

        <section>
          <h3 class="label-md text-outline mb-6">Price Range</h3>
          <div class="px-2">
            <input class="w-full h-1 bg-surface-container-highest rounded-lg appearance-none cursor-pointer accent-primary" type="range"/>
            <div class="flex justify-between mt-4 text-sm text-on-surface-variant font-medium">
              <span>$0</span>
              <span>$5,000+</span>
            </div>
          </div>
        </section>
      </div>
    </aside>

    <!-- Main Content Area -->
    <div class="flex-1">
      <!-- Product Grid Container -->
      <div class="glass-card rounded-3xl p-8 lg:p-10">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-12">
          <app-product-card 
            *ngFor="let product of products" 
            [product]="product"
            [showActions]="true"
            (addToCart)="handleAddToCart($event)"
            (viewDetails)="handleViewDetails($event)">
          </app-product-card>
        </div>
      </div>

      <!-- Pagination -->
      <div class="mt-20 flex justify-center items-center gap-4">
        <button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container text-on-surface-variant hover:bg-primary hover:text-on-primary transition-all tonal-shift">
          <span class="material-symbols-outlined">chevron_left</span>
        </button>
        <div class="flex items-center gap-2">
          <button class="w-12 h-12 flex items-center justify-center rounded-full bg-primary text-on-primary font-bold shadow-primary">1</button>
          <button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container text-on-surface hover:bg-surface-container-high font-bold transition-all tonal-shift">2</button>
          <button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container text-on-surface hover:bg-surface-container-high font-bold transition-all tonal-shift">3</button>
        </div>
        <button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container text-on-surface-variant hover:bg-primary hover:text-on-primary transition-all tonal-shift">
          <span class="material-symbols-outlined">chevron_right</span>
        </button>
      </div>
    </div>
  </div>
</main>
